<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B0E14"/>
      <stop offset="100%" style="stop-color:#10141F"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3DDC97;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#3DDC97;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3DDC97;stop-opacity:0"/>
    </linearGradient>
    <!-- Engineering grid pattern -->
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="8"/>
  <rect width="900" height="200" fill="url(#grid)" rx="8"/>

  <!-- Bottom accent line -->
  <rect x="0" y="196" width="900" height="2" fill="url(#accent)"/>

  <!-- Left icon block -->
  <rect x="40" y="76" width="48" height="48" rx="4"
        fill="#3DDC97" fill-opacity="0.12"
        stroke="#3DDC97" stroke-opacity="0.4" stroke-width="1"/>
  <!-- Activity/pulse lines inside icon -->
  <polyline points="52,100 60,100 64,88 68,112 72,95 76,100 80,100"
            fill="none" stroke="#3DDC97" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Title -->
  <text x="108" y="95" font-family="'JetBrains Mono', 'IBM Plex Mono', monospace"
        font-size="28" font-weight="600" fill="#E8EAED" letter-spacing="-0.5">RiskCore</text>
  <text x="108" y="114" font-family="Inter, ui-sans-serif, sans-serif"
        font-size="12" fill="#7C8696" letter-spacing="1.5">AI CREDIT RISK PLATFORM</text>

  <!-- Divider -->
  <line x1="108" y1="126" x2="520" y2="126" stroke="#1C2333" stroke-width="1"/>

  <!-- Subtitle line -->
  <text x="108" y="145" font-family="Inter, ui-sans-serif, sans-serif"
        font-size="13" fill="#A6AFBE">
    Loan default prediction · Explainable AI · Fraud detection · Portfolio VaR
  </text>

  <!-- Right-side metric readouts -->
  <g transform="translate(600, 60)">
    <!-- ROC-AUC -->
    <rect x="0" y="0" width="120" height="56" rx="3"
          fill="#10141F" stroke="#1C2333" stroke-width="1"/>
    <text x="10" y="18" font-family="Inter, sans-serif" font-size="9"
          fill="#7C8696" letter-spacing="1">ROC-AUC</text>
    <text x="10" y="44" font-family="'JetBrains Mono', monospace"
          font-size="28" font-weight="600" fill="#3DDC97">0.951</text>

    <!-- KS STAT -->
    <rect x="134" y="0" width="120" height="56" rx="3"
          fill="#10141F" stroke="#1C2333" stroke-width="1"/>
    <text x="144" y="18" font-family="Inter, sans-serif" font-size="9"
          fill="#7C8696" letter-spacing="1">KS STAT</text>
    <text x="144" y="44" font-family="'JetBrains Mono', monospace"
          font-size="28" font-weight="600" fill="#E8B339">0.812</text>

    <!-- Bottom row -->
    <!-- Fraud AUC -->
    <rect x="0" y="68" width="120" height="56" rx="3"
          fill="#10141F" stroke="#1C2333" stroke-width="1"/>
    <text x="10" y="86" font-family="Inter, sans-serif" font-size="9"
          fill="#7C8696" letter-spacing="1">FRAUD AUC</text>
    <text x="10" y="112" font-family="'JetBrains Mono', monospace"
          font-size="28" font-weight="600" fill="#5B9FFF">0.978</text>

    <!-- Models trained -->
    <rect x="134" y="68" width="120" height="56" rx="3"
          fill="#10141F" stroke="#1C2333" stroke-width="1"/>
    <text x="144" y="86" font-family="Inter, sans-serif" font-size="9"
          fill="#7C8696" letter-spacing="1">MODELS</text>
    <text x="144" y="112" font-family="'JetBrains Mono', monospace"
          font-size="28" font-weight="600" fill="#E8EAED">6+</text>
  </g>
</svg>
